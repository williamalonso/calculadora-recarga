<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora de Custo de Recarga</title>
    <!-- Carrega o Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Carrega a fonte Inter -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        /* Define a fonte Inter como padrão */
        body {
            font-family: 'Inter', sans-serif;
        }
        /* Melhora a aparência do input range (slider) */
        input[type='range']::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 20px;
            height: 20px;
            background: #2563eb; /* Azul do Tailwind */
            border-radius: 50%;
            cursor: pointer;
            margin-top: -6px; /* Centraliza o thumb no track */
        }
        input[type='range']::-moz-range-thumb {
            width: 20px;
            height: 20px;
            background: #2563eb;
            border-radius: 50%;
            cursor: pointer;
        }
    </style>
</head>
<body class="bg-slate-100 flex items-center justify-center min-h-screen p-4">

    <!-- Card Principal -->
    <div class="bg-white p-6 sm:p-8 rounded-2xl shadow-xl max-w-lg w-full">

        <!-- Cabeçalho -->
        <h1 class="text-2xl sm:text-3xl font-bold text-slate-900 mb-2">
            Calculadora de Recarga ⚡
        </h1>
        <p class="text-slate-600 mb-6 sm:mb-8">
            Estime o custo para carregar seu carro elétrico (baseado em 44,9 kWh).
        </p>

        <!-- Seção de Inputs -->
        <div class="space-y-6">
            
            <!-- Input: Preço do kWh -->
            <div>
                <label for="price" class="block text-sm font-medium text-slate-700 mb-1.5">
                    Preço do kWh (R$)
                </label>
                <div class="relative">
                    <!-- Símbolo R$ dentro do input -->
                    <span class="absolute inset-y-0 left-0 pl-3.5 flex items-center text-slate-500 text-lg">
                        R$
                    </span>
                    <input 
                        type="number" 
                        id="price" 
                        step="0.01" 
                        min="0" 
                        value="1.80" 
                        placeholder="1.80" 
                        class="w-full pl-12 pr-4 py-3 border border-slate-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500 text-lg"
                    >
                </div>
            </div>

            <!-- Input: Porcentagem da Bateria -->
            <div>
                <label for="percentageSlider" class="block text-sm font-medium text-slate-700 mb-2">
                    Carga Atual da Bateria (%)
                </label>
                <div class="flex items-center space-x-4">
                    <!-- Slider -->
                    <input 
                        type="range" 
                        id="percentageSlider" 
                        min="0" 
                        max="100" 
                        value="36" 
                        class="w-full h-2 bg-slate-200 rounded-lg appearance-none cursor-pointer accent-blue-600"
                    >
                    <!-- Input numérico que sincroniza com o slider -->
                    <input 
                        type="number" 
                        id="percentageInput" 
                        min="0" 
                        max="100" 
                        value="36" 
                        class="w-24 text-center py-2.5 border border-slate-300 rounded-lg text-lg font-medium"
                    >
                </div>
            </div>
        </div>

        <!-- Seção de Resultados -->
        <div id="results" class="mt-8 sm:mt-10 pt-6 sm:pt-8 border-t border-slate-200 space-y-4">
            
            <!-- Resultado: Carga Completa -->
            <div class="bg-slate-50 p-5 rounded-lg flex justify-between items-center transition-all duration-300">
                <div>
                    <h2 class="text-sm font-medium text-slate-600">
                        Custo para Carga Completa
                    </h2>
                    <p class="text-sm text-slate-500">
                        (0% a 100% | 44,9 kWh)
                    </p>
                </div>
                <p id="totalCostFull" class="text-2xl font-bold text-slate-800">
                    R$ 0,00
                </p>
            </div>

            <!-- Resultado: Carga Parcial (Destaque) -->
            <div class="bg-blue-50 p-5 rounded-lg flex justify-between items-center ring-2 ring-blue-500 transition-all duration-300">
                <div>
                    <h2 class="text-base font-bold text-blue-800">
                        Custo para Completar
                    </h2>
                    <p id="partialChargeLabel" class="text-sm text-blue-700 font-medium">
                        De 36% até 100%
                    </p>
                </div>
                <p id="totalCostPartial" class="text-3xl font-bold text-blue-700">
                    R$ 0,00
                </p>
            </div>
        </div>
    </div>

    <script>
        // --- Constantes ---
        const TOTAL_BATTERY_KWH = 44.9;

        // --- Seletores do DOM ---
        const priceInput = document.getElementById('price');
        const percentageSlider = document.getElementById('percentageSlider');
        const percentageInput = document.getElementById('percentageInput');
        
        const totalCostFullEl = document.getElementById('totalCostFull');
        const totalCostPartialEl = document.getElementById('totalCostPartial');
        const partialChargeLabelEl = document.getElementById('partialChargeLabel');
        const resultsEl = document.getElementById('results');

        /**
         * Formata um número como moeda BRL (Ex: R$ 51,72)
         * @param {number} value - O valor numérico
         * @returns {string} - O valor formatado
         */
        function formatCurrency(value) {
            // Garante que o valor é um número e fixa 2 casas decimais
            const fixedValue = Number(value).toFixed(2);
            // Troca o ponto decimal por vírgula
            return `R$ ${fixedValue.replace('.', ',')}`;
        }

        /**
         * Função principal que calcula e exibe os custos
         */
        function calculateCost() {
            // --- 1. Obter Valores ---
            // Pega o preço do kWh, ou usa 0 se estiver vazio/inválido
            let pricePerKwh = parseFloat(priceInput.value) || 0;
            
            // Pega a porcentagem atual, ou usa 0 se estiver vazio/inválido
            let currentPercentage = parseInt(percentageInput.value, 10);
            if (isNaN(currentPercentage)) {
                currentPercentage = 0;
            }

            // --- 2. Validar Valores ---
            // Garante que a porcentagem esteja entre 0 e 100
            if (currentPercentage < 0) currentPercentage = 0;
            if (currentPercentage > 100) currentPercentage = 100;

            // --- 3. Fazer Cálculos ---
            
            // Cálculo 1: Custo para carga completa (de 0% a 100%)
            const costFull = pricePerKwh * TOTAL_BATTERY_KWH;
            
            // Cálculo 2: Custo para carga parcial (da % atual até 100%)
            const percentageToCharge = 100 - currentPercentage;
            const kwhNeeded = (percentageToCharge / 100) * TOTAL_BATTERY_KWH;
            const costPartial = pricePerKwh * kwhNeeded;

            // --- 4. Exibir Resultados ---
            totalCostFullEl.textContent = formatCurrency(costFull);
            totalCostPartialEl.textContent = formatCurrency(costPartial);
            partialChargeLabelEl.textContent = `De ${currentPercentage}% até 100%`;
        }

        // --- 5. Sincronizar Inputs ---

        // Quando o slider mudar, atualiza o input numérico
        percentageSlider.addEventListener('input', () => {
            percentageInput.value = percentageSlider.value;
            calculateCost(); // Recalcula
        });

        // Quando o input numérico mudar, atualiza o slider
        percentageInput.addEventListener('input', (e) => {
            let val = parseInt(e.target.value, 10);
            
            // Lida com input vazio temporariamente
            if (isNaN(val)) {
                // Não faz nada, espera o usuário terminar de digitar
            } else {
                // Limita o valor entre 0 e 100
                if (val < 0) {
                    val = 0; 
                    e.target.value = 0; // Corrige o input
                }
                if (val > 100) {
                    val = 100;
                    e.target.value = 100; // Corrige o input
                }
                percentageSlider.value = val; // Sincroniza o slider
            }
            calculateCost(); // Recalcula
        });

        // Recalcula quando o preço mudar
        priceInput.addEventListener('input', calculateCost);

        // --- 6. Cálculo Inicial ---
        // Calcula os custos assim que a página carregar com os valores padrão
        window.addEventListener('load', calculateCost);

    </script>
</body>
</html>
