<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Calculadora de Recarga ⚡</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Google Fonts: Inter -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">

</head>
<body class="bg-slate-50 flex items-center justify-center min-h-screen p-4 sm:p-6">

    <!-- Card Principal -->
    <div class="bg-white p-6 sm:p-10 rounded-[2rem] shadow-2xl max-w-lg w-full border border-slate-100">

        <!-- Cabeçalho -->
        <header class="mb-8">
            <h1 class="text-2xl sm:text-3xl font-bold text-slate-900 flex items-center gap-2">
                Calculadora de Recarga ⚡
            </h1>
            <p class="text-slate-500 mt-1">
                Baseado em bateria de <span class="font-bold text-slate-700">44,9 kWh</span>
            </p>
        </header>

        <!-- Formulário de Inputs -->
        <div class="space-y-8">
            
            <!-- Grupo: Preços -->
            <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
                <div>
                    <label class="block text-xs font-bold text-slate-400 uppercase tracking-wider mb-2">Preço do kWh</label>
                    <div class="relative">
                        <span class="absolute inset-y-0 left-0 pl-4 flex items-center text-slate-400 font-semibold">R$</span>
                        <input type="number" id="price" step="0.01" inputmode="decimal" value="1.80" 
                            class="w-full pl-12 pr-4 py-4 bg-slate-50 border-2 border-slate-100 rounded-2xl focus:border-blue-500 focus:bg-white transition-all outline-none font-bold text-lg">
                    </div>
                </div>
                <div>
                    <label class="block text-xs font-bold text-slate-400 uppercase tracking-wider mb-2">Taxa de Ativação</label>
                    <div class="relative">
                        <span class="absolute inset-y-0 left-0 pl-4 flex items-center text-slate-400 font-semibold">R$</span>
                        <input type="number" id="activationFee" step="0.01" inputmode="decimal" value="2.00" 
                            class="w-full pl-12 pr-4 py-4 bg-slate-50 border-2 border-slate-100 rounded-2xl focus:border-blue-500 focus:bg-white transition-all outline-none font-bold text-lg">
                    </div>
                </div>
            </div>

            <!-- Grupo: Bateria (Slider + Input) -->
            <div class="bg-blue-50/30 p-5 rounded-2xl border border-blue-50">
                <div class="flex justify-between items-center mb-2">
                    <label class="text-sm font-bold text-slate-700">Carga Atual da Bateria</label>
                    <div class="flex items-center gap-2">
                        <input type="number" id="percentageInput" min="0" max="100" value="20" 
                            class="w-16 py-1 border-b-2 border-blue-200 bg-transparent text-center font-bold text-blue-600 outline-none focus:border-blue-500 text-lg">
                        <span class="font-bold text-blue-400">%</span>
                    </div>
                </div>
                <input type="range" id="percentageSlider" min="0" max="100" value="20" class="accent-blue-600">
            </div>

            <!-- Grupo: Desconto (Slider + Input) -->
            <div class="bg-green-50/30 p-5 rounded-2xl border border-green-50">
                <div class="flex justify-between items-center mb-2">
                    <label class="text-sm font-bold text-slate-700">Desconto Aplicado</label>
                    <div class="flex items-center gap-2">
                        <input type="number" id="discountInput" min="0" max="100" value="0" 
                            class="w-16 py-1 border-b-2 border-green-200 bg-transparent text-center font-bold text-green-600 outline-none focus:border-green-500 text-lg">
                        <span class="font-bold text-green-400">%</span>
                    </div>
                </div>
                <input type="range" id="discountSlider" min="0" max="100" value="0" class="accent-green-600">
            </div>
        </div>

        <!-- Seção de Resultados -->
        <div class="mt-10 pt-8 border-t border-slate-100 space-y-4">
            
            <!-- Resultado: Carga Completa -->
            <div class="p-5 rounded-2xl bg-slate-50 flex justify-between items-center">
                <div>
                    <h2 class="text-xs font-bold text-slate-400 uppercase">Carga Completa</h2>
                    <p class="text-[10px] text-slate-400 font-medium">0% a 100% (44,9 kWh)</p>
                </div>
                <p id="totalCostFull" class="text-2xl font-bold text-slate-800 whitespace-nowrap">R$ 0,00</p>
            </div>

            <!-- Resultado: Carga Parcial (Destaque) -->
            <div class="p-6 rounded-3xl bg-blue-600 text-white shadow-xl shadow-blue-200 flex justify-between items-center transition-transform active:scale-[0.98]">
                <div>
                    <h2 class="text-sm font-bold text-blue-100 opacity-90">Custo para Completar</h2>
                    <p id="partialChargeLabel" class="text-xs font-medium text-blue-200">De 20% até 100%</p>
                </div>
                <p id="totalCostPartial" class="text-3xl font-bold whitespace-nowrap">R$ 0,00</p>
            </div>
        </div>

        <p class="text-center text-[10px] text-slate-300 mt-8 font-medium uppercase tracking-widest">
            Calculadora de Recarga v2.0
        </p>
    </div>

    <script src="index.js"></script>
</body>
</html>
