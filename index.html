<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora de Custo de Recarga</title>
    <!-- Carrega o Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Carrega a fonte Inter -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="./styles.css">
</head>
<body class="bg-slate-100 flex items-center justify-center min-h-screen p-4">

    <!-- Card Principal -->
    <div class="bg-white p-6 sm:p-8 rounded-2xl shadow-xl max-w-lg w-full">

        <!-- Cabeçalho -->
        <h1 class="text-2xl sm:text-3xl font-bold text-slate-900 mb-2">
            Calculadora de Recarga ⚡
        </h1>
        <p class="text-slate-600 mb-6 sm:mb-8">
            Estime o custo para carregar seu carro elétrico (baseado em 44,9 kWh).
        </p>

        <!-- Seção de Inputs -->
        <div class="space-y-6">
            
            <!-- Input: Preço do kWh -->
            <div>
                <label for="price" class="block text-sm font-medium text-slate-700 mb-1.5">
                    Preço do kWh (R$)
                </label>
                <div class="relative">
                    <!-- Símbolo R$ dentro do input -->
                    <span class="absolute inset-y-0 left-0 pl-3.5 flex items-center text-slate-500 text-lg">
                        R$
                    </span>
                    <input 
                        type="number" 
                        id="price" 
                        step="0.01" 
                        min="0" 
                        value="1.80" 
                        placeholder="1.80" 
                        class="w-full pl-12 pr-4 py-3 border border-slate-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500 text-lg"
                    >
                </div>
            </div>

            <!-- Input: Taxa de Ativação -->
            <div>
                <label for="activationFee" class="block text-sm font-medium text-slate-700 mb-1.5">
                    Taxa de Ativação (R$)
                </label>
                <div class="relative">
                    <span class="absolute inset-y-0 left-0 pl-3.5 flex items-center text-slate-500 text-lg">
                        R$
                    </span>
                    <input 
                        type="number" 
                        id="activationFee" 
                        step="0.01" 
                        min="0" 
                        value="2.00" 
                        placeholder="2.00" 
                        class="w-full pl-12 pr-4 py-3 border border-slate-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500 text-lg"
                    >
                </div>
            </div>

            <!-- Input: Porcentagem da Bateria -->
            <div>
                <label for="percentageSlider" class="block text-sm font-medium text-slate-700 mb-2">
                    Carga Atual da Bateria (%)
                </label>
                <div class="flex items-center space-x-4">
                    <!-- Slider -->
                    <input 
                        type="range" 
                        id="percentageSlider" 
                        min="0" 
                        max="100" 
                        value="20" 
                        class="w-full h-2 bg-slate-200 rounded-lg appearance-none cursor-pointer accent-blue-600"
                    >
                    <!-- Input numérico que sincroniza com o slider -->
                    <input 
                        type="number" 
                        id="percentageInput" 
                        min="0" 
                        max="100" 
                        value="20" 
                        class="w-24 text-center py-2.5 border border-slate-300 rounded-lg text-lg font-medium"
                    >
                </div>
            </div>

            
        </div>

        <!-- Seção de Resultados -->
        <div id="results" class="mt-8 sm:mt-10 pt-6 sm:pt-8 border-t border-slate-200 space-y-4">
            
            <!-- Resultado: Carga Completa -->
            <div class="bg-slate-50 p-5 rounded-lg flex justify-between items-center transition-all duration-300">
                <div>
                    <h2 class="text-sm font-medium text-slate-600">
                        Custo para Carga Completa
                    </h2>
                    <p class="text-sm text-slate-500">
                        (0% a 100% | 44,9 kWh)
                    </p>
                </div>
                <p id="totalCostFull" class="text-2xl font-bold text-slate-800">
                    R$ 0,00
                </p>
            </div>

            <!-- Resultado: Carga Parcial (Destaque) -->
            <div class="bg-blue-50 p-5 rounded-lg flex justify-between items-center ring-2 ring-blue-500 transition-all duration-300">
                <div>
                    <h2 class="text-base font-bold text-blue-800">
                        Custo para Completar
                    </h2>
                    <p id="partialChargeLabel" class="text-sm text-blue-700 font-medium">
                        De 36% até 100%
                    </p>
                </div>
                <p id="totalCostPartial" class="text-3xl font-bold text-blue-700">
                    R$ 0,00
                </p>
            </div>
        </div>
    </div>

    <script src="./index.js"></script>
</body>
</html>
